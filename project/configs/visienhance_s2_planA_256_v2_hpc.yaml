# Stage 2 Plan A @256 v2 (HPC) — B3-sourced DP-Loss + pos-hinge.
# v1 根因: DP-Loss 用 Q-VIB/B0 latent (ABCD 置零, 无诊断语义) 而 eval 用 B3 oracle →
#   train/eval 错配, dangerous_flip 0.054→0.176 恶化. v2 让 DP-Loss 与 eval 同源 (B3),
#   加 pos-hinge 显式禁止真阳翻阴, pos 过采样 10x 补 1.7% 不平衡.
# DP-Loss = KL(softmax B3(enh) ‖ softmax B3(ref)) [Lemma 3 方向] + λ_h·relu(logit_ref[mel]-logit_enh[mel]).clamp(0,3)_{y=1}.
# v3 修: v2 绝对-margin hinge train_H 恒零(B3 在 train split 过拟合饱和 p≈1) → 安全项零梯度,
#   dangerous_flip 0.054→0.243 恶化. v3 改 logit 空间相对 hinge (抗饱和+同图配对). 诊断: diag2/diag3.
# Resume from Stage 1 @256 best (model weights only). VisiScore + Q-VIB + B3 冻结.

stage: 2

model:
  base_channels: 64
  enc_blocks: [2, 2, 2]
  mid_blocks: 6
  dec_blocks: [2, 2, 2]
  film_hidden: 128
  film_scale: 0.1

data:
  labels_csv: /gpfs/work/bio/jiayu2403/visienhance/data/quality_labels_nocrop_hpc.csv
  split_csv:  /gpfs/work/bio/jiayu2403/visienhance/data/isic_split.csv
  meta_csv:   /gpfs/work/bio/jiayu2403/visienhance/data/train-metadata.csv
  img_size: 256
  severity: mixed
  val_severity: mixed
  batch_size: 8
  num_workers: 8
  pos_oversample: 10        # melanoma ~1.7% → ~15%, 给 pos-hinge 足够信号

train:
  epochs: 80
  lr: 1.0e-5
  weight_decay: 1.0e-4
  amp: true
  seed: 42
  early_stop_patience: 999
  resume_from: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage1_planA_256/best_visienhance.pth
  model_only: true

loss:
  lambda_l1: 1.0
  lambda_lpips: 0.01
  lambda_dp: 0.005          # probe 标定: DP 项 ≈ 10% L1 (KL_enh=0.468, L1=0.0223 @Stage1 best)
  lambda_hinge: 0.005       # v3 logit-hinge 标定: mean_mag(C=3)=0.97 → hinge 项 ≈ 22% L1 (diag3)
  hinge_clamp: 3.0          # logit-space 相对 hinge 上限: relu(logit_ref[mel]-logit_enh[mel]).clamp(max=3)
                            # 旧 hinge_margin=0.5 绝对版 train_H 恒零(B3 train 饱和) → 改 logit 相对式
  lambda_quality: 0.0
  quality_target: 0.55

frozen_models:
  visiscore_ckpt: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/best_visiscore.pth
  qvib_ckpt:     /gpfs/work/bio/jiayu2403/visienhance/checkpoints/efnet/best_qad.pth
  b3_ckpt:       /gpfs/work/bio/jiayu2403/visienhance/checkpoints/efficientnet_b3_isic.pth
  qvib_encoder:
    d_model: 128
    n_heads: 4
    latent_dim: 64
    efnet_dim: 1280
    use_tokenizer: true

output:
  checkpoint_dir: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage2_planA_256_v3

wandb:
  project: visienhance
  name: stage2_planA_256_v3_hpc
  mode: offline
