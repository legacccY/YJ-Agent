# Ablation: Adaptive Prior only — fine-tuned EfficientNet-B3 backbone
data:
  labels_csv: D:/YJ-Agent/data/quality_labels_all.csv
  metadata_csv: D:/YJ-Agent/data/raw/isic2020/train-metadata.csv
  abcd_cache_csv: D:/YJ-Agent/data/abcd_cache.csv
  efnet_features_npy: D:/YJ-Agent/data/finetuned_features.npy
  efnet_index_csv: D:/YJ-Agent/data/finetuned_index.csv
  split_csv: D:/YJ-Agent/data/isic_split.csv
  num_workers: 4

model:
  sam_checkpoint: D:/YJ-Agent/checkpoints/mobile_sam.pt
  prior:
    sigma0_sq: 0.9
    tau: 0.5
    alpha: 5.0
  encoder:
    d_model: 128
    n_heads: 4
    latent_dim: 64
    efnet_dim: 1536
    use_tokenizer: false   # no quality attention modulation
  classifier:
    hidden_dim: 128
    num_classes: 2

train:
  epochs: 30
  batch_size: 256
  lr: 5.0e-5
  weight_decay: 1.0e-4
  seed: 42
  amp: true
  beta_max: 1.0e-4
  beta_warmup_steps: 5000

output:
  checkpoint_dir: D:/YJ-Agent/checkpoints/adaptive_ft

wandb:
  project: visiskin-agent
  entity: null
  mode: offline

device:
  cuda: true
  gpu_id: 0
