# BMVC §5.4 — Backbone Universality: DeiT-Tiny baseline (Transformer family)
# Pure backbone classification, outputs val/test logits for run_qcts.py.

backbone:
  name: deit_tiny_patch16_224   # timm model name
  pretrained: true              # DeiT-Tiny ImageNet weights via timm
  num_classes: 2
  drop_rate: 0.1                # head dropout (timm arg)
  drop_path_rate: 0.1           # stochastic depth (timm arg)

data:
  img_size: 224
  metadata_csv: D:/YJ-Agent/data/raw/isic2020/train-metadata.csv
  split_csv: D:/YJ-Agent/data/isic_split.csv
  image_root: D:/YJ-Agent/data/raw/isic2020/train-image/image
  num_workers: 4

train:
  epochs: 30
  batch_size: 96               # ViT-Tiny is 5.5M (vs ResNet 23.5M), more headroom
  lr: 1.0e-4                   # head LR (conservative for medical domain)
  lr_backbone: 5.0e-6          # pretrained backbone LR (20x smaller)
  weight_decay: 5.0e-2         # ViT standard weight decay
  seed: 42
  amp: true
  label_smoothing: 0.1         # ViT standard
  warmup_epochs: 5
  grad_clip: 1.0

output:
  checkpoint_dir: D:/YJ-Agent/project/checkpoints/vit_tiny
  logits_dir: D:/YJ-Agent/project/results/backbones/vit_tiny
  best_metric: auc

wandb:
  project: visiskin-bmvc-backbones
  entity: null
  mode: offline
  run_name: deit-tiny-isic2020

device:
  cuda: true
  gpu_id: 0
