# Stage 2 Plan A @256 (HPC, XJTLU gpu4090) — DP-Loss, 分辨率对齐.
# DP-Loss = KL(p_φ(z|x_enh) ‖ p_φ(z|x_ref))  [Lemma 3]. E7 已在 128 基线 PASS(p=4e-12),
#   本阶段把已验证机制搬到对齐分辨率 + 加大 λ_dp 进一步压 E3 ΔAUC.
# Resume from Stage 1 @256 best (model weights only). VisiScore + Q-VIB 冻结.

stage: 2

model:
  base_channels: 64
  enc_blocks: [2, 2, 2]
  mid_blocks: 6
  dec_blocks: [2, 2, 2]
  film_hidden: 128
  film_scale: 0.1

data:
  labels_csv: /gpfs/work/bio/jiayu2403/visienhance/data/quality_labels_nocrop_hpc.csv
  split_csv:  /gpfs/work/bio/jiayu2403/visienhance/data/isic_split.csv
  img_size: 256           # ← 对齐 Stage1 @256
  severity: mixed
  val_severity: mixed
  batch_size: 8           # 256 显存; OOM 则降 4
  num_workers: 8

train:
  epochs: 80
  lr: 1.0e-5              # Stage2 微调, 续 Stage1 best, 低 lr
  weight_decay: 1.0e-4
  amp: true
  seed: 42
  early_stop_patience: 999
  resume_from: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage1_planA_256/best_visienhance.pth
  model_only: true        # 只载模型权重, 不载 optimizer/epoch

loss:
  lambda_l1: 1.0
  lambda_lpips: 0.01
  lambda_dp: 0.1          # ← 加大 (原 0.05 太弱, 仅压 5.0->4.2%). 不够则下一轮 0.2.
  lambda_quality: 0.0
  quality_target: 0.55

frozen_models:
  visiscore_ckpt: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/best_visiscore.pth
  qvib_ckpt:     /gpfs/work/bio/jiayu2403/visienhance/checkpoints/efnet/best_qad.pth
  qvib_encoder:
    d_model: 128
    n_heads: 4
    latent_dim: 64
    efnet_dim: 1280
    use_tokenizer: true

output:
  checkpoint_dir: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage2_planA_256

wandb:
  project: visienhance
  name: stage2_planA_256_hpc
  mode: offline
