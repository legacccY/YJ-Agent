# Stage 2 Plan A @256 v6 (HPC) — mask-weighted L1 + feature-level DP + pos-hinge.
# Motivation (会话 23): v5 E5 per-class 拆案暴露增强对黑色素瘤 salvage 仅 5.2%、damage 31%
#   (救 4 毁 85 净 −81) —— 增强系统性磨平病灶结构。v6 在 v5 基础上加 mask-weighted L1:
#   病灶区 (precomputed lesion mask) L1 权重 ×(1+lambda_mask)，强迫忠实重建病灶、不准磨平。
# Mask 来源 = 经典中心暗 blob 分割 (Otsu→GrabCut→中心高斯三层, scripts/precompute_lesion_masks.py)。
#   弃 ResNet/B3 Grad-CAM (smoke 证伪: 皮肤镜上打角落 shortcut, 非病灶)、零循环 (非 B3 eval probe)。
# 其余 (feature-DP / hinge / FiLM / raw-q 喂法) 全同 v5, 保 E1-E12 可比。
# Resume from Stage 1 @256 best (v5 同血统)。VisiScore + B3 冻结。

stage: 2

model:
  base_channels: 64
  enc_blocks: [2, 2, 2]
  mid_blocks: 6
  dec_blocks: [2, 2, 2]
  film_hidden: 128
  film_scale: 0.1

data:
  labels_csv: /gpfs/work/bio/jiayu2403/visienhance/data/quality_labels_nocrop_hpc.csv
  split_csv:  /gpfs/work/bio/jiayu2403/visienhance/data/isic_split.csv
  meta_csv:   /gpfs/work/bio/jiayu2403/visienhance/data/train-metadata.csv
  masks_dir:  /gpfs/work/bio/jiayu2403/visienhance/data/lesion_masks   # v6: precomputed lesion masks
  img_size: 256
  severity: mixed
  val_severity: mixed
  batch_size: 8
  num_workers: 8
  pos_oversample: 10

train:
  epochs: 80
  lr: 3.0e-5
  weight_decay: 1.0e-4
  amp: true
  seed: 42
  early_stop_patience: 999
  resume_from: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage1_planA_256/best_visienhance.pth
  model_only: true

loss:
  lambda_l1: 1.0
  lambda_mask: 3.0          # v6: 病灶像素 L1 权重 ×(1+3)=4×, w=1+3*mask, mask∈[0,1]
  lambda_lpips: 0.01
  dp_mode: feat            # v5: feature-level DP (channel-wise cosine 对齐 B3 最终特征图)
  lambda_dp: 0.019         # v5 标定: feat 项 ≈30% L1
  lambda_hinge: 0.04       # v5 logit-hinge, 守阳方向
  hinge_clamp: 3.0
  lambda_quality: 0.0
  quality_target: 0.55

frozen_models:
  visiscore_ckpt: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/best_visiscore.pth
  qvib_ckpt:     /gpfs/work/bio/jiayu2403/visienhance/checkpoints/efnet/best_qad.pth
  b3_ckpt:       /gpfs/work/bio/jiayu2403/visienhance/checkpoints/efficientnet_b3_isic.pth
  qvib_encoder:
    d_model: 128
    n_heads: 4
    latent_dim: 64
    efnet_dim: 1280
    use_tokenizer: true

output:
  checkpoint_dir: /gpfs/work/bio/jiayu2403/visienhance/checkpoints/visienhance/stage2_planA_256_v6_maskL1

wandb:
  project: visienhance
  name: stage2_planA_256_v6_maskL1_hpc
  mode: offline
