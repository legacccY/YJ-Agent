# Stage 2: Diagnosis-Preserving Fine-tune
# Adds DP-Loss = KL(p_φ(z|x_enh) ‖ p_φ(z|x_ref))  [Lemma 3]
# VisiScore-Net + Q-VIB encoder both frozen.
# Resume from Stage 1 best checkpoint.

stage: 2

model:
  base_channels: 48
  enc_blocks: [2, 2]
  mid_blocks: 4
  dec_blocks: [2, 2]
  film_hidden: 128
  film_scale: 0.1

data:
  labels_csv: D:/YJ-Agent/data/quality_labels_all.csv
  split_csv:  D:/YJ-Agent/data/isic_split.csv
  img_size: 256
  severity: mixed
  batch_size: 4
  num_workers: 4

train:
  epochs: 80
  lr: 1.0e-5
  weight_decay: 1.0e-4
  amp: true
  seed: 42
  early_stop_patience: 999  # no early stop in stage 2
  resume_from: D:/YJ-Agent/checkpoints/visienhance/stage1/best_visienhance.pth

loss:
  lambda_l1: 1.0
  lambda_lpips: 0.1
  lambda_dp: 0.05          # Lemma 3: KL between enhanced and reference posterior
  lambda_quality: 0.0
  quality_target: 0.55

frozen_models:
  visiscore_ckpt: D:/YJ-Agent/checkpoints/best_visiscore.pth
  qvib_ckpt:     D:/YJ-Agent/checkpoints/efnet/best_qad.pth
  qvib_encoder:
    d_model: 128
    n_heads: 4
    latent_dim: 64
    efnet_dim: 1280
    use_tokenizer: true

output:
  checkpoint_dir: D:/YJ-Agent/checkpoints/visienhance/stage2

wandb:
  project: visienhance
  mode: offline
