# ============================================================
# B 路线续训臂 3 — A0+ early-exit ViT 域 A→B 续训（「自然容量」参照，11.76M）
#
# 目的：大容量 ViT（11.76M）作为「自然容量」参照。
#   三臂 RF 对比：NCA(3.22M) / small-ViT(3.28M, 等容量) / A0+(11.76M, 大容量)。
#   若 RF_nca ≈ RF_smallvit > RF_a0plus → 容量大本就抗遗忘（容量假说成立，R1 证据不足）。
#   若 RF_nca > RF_smallvit ≈ RF_a0plus → 结构性抗遗忘（NCA 独特，堵 R1）。
#
# 复现零偏离：除 load_checkpoint/read_checkpoint/data.root_path/data.subset_file
#   / logging.folder / epochs 外，所有超参与 a0plus_earlyexit_vit_vits_nih10k.yaml 完全一致。
#
# TODO（主线填）：
#   - meta.read_checkpoint: 填 A0+ NIH ep50 ckpt HPC 路径
#     HPC 路径模板：/gpfs/work/bio/jiayu2403/nca-jepa/logs/a0plus_earlyexit_vit_vits_nih10k/jepa-ep50.pth.tar
#   - data.root_path: 填域 B 数据集 HPC 路径（待 VinDr-CXR/CheXpert 就位）
#   - data.subset_file: 由 tools/prep_domainB_cxr.py 生成
# ============================================================
data:
  batch_size: 64
  color_jitter_strength: 0.2  # 与 a0plus 一致
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  dataset: nih_cxr14
  image_folder: ""            # 空：split 行已含 train/<id>.png 相对路径（VinDr xhlulu 512px PNG）
  num_workers: 8
  pin_mem: true
  root_path: data/vindr_cxr   # 域 B = VinDr-CXR（Kaggle xhlulu 镜像）；HPC 相对路径，待上传
  subset_file: data/vindr_cxr/splits/domainB_10k.txt  # prep_domainB_cxr.py 生成（9000 train）
  use_color_distortion: true
  use_gaussian_blur: true
  use_horizontal_flip: true
logging:
  folder: $EXP_LOG_ROOT/b_continual_a0plus/
  write_tag: jepa
mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.15
  - 0.2
meta:
  copy_data: false
  load_checkpoint: true       # 续训载入域 A ckpt
  reset_epoch: true           # 续训重置 epoch 0（否则 ckpt['epoch']=50 → range(50,20) 空跑不训练）
  model_name: vit_small       # 与 a0plus 一致
  pred_depth: 6               # 与 a0plus 一致（6 层，11.76M 大容量）
  pred_emb_dim: 384           # 与 a0plus 一致
  read_checkpoint: /gpfs/work/bio/jiayu2403/nca-jepa/logs/a0plus_earlyexit_vit_vits_nih10k/jepa-ep50.pth.tar  # A0+ seed42 域A ckpt
  use_bfloat16: true
  # --- A0+ 字段（与 a0plus_earlyexit_vit_vits_nih10k.yaml 完全一致）---
  predictor_type: earlyexit_vit
  exit_stop_grad: false       # 全回传（官方三源一致）
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 20              # 短续训，与三臂一致
  final_lr: 1.0e-06
  final_weight_decay: 0.05
  ipe_scale: 1.25
  lr: 2.0e-4              # 与 a0plus 一致（复现零偏离）
  start_lr: 4.0e-5
  warmup: 2               # 20ep 缩放
  weight_decay: 0.05
