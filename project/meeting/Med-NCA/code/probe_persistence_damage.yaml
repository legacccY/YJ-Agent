# probe_persistence_damage.yaml
# mode=damage: seed=原图, 随机矩形损伤后跑 T2 步, loss=MSE(输出,原图)
# 恒等 NCA 无法填补损伤 -> loss 大 -> 真测试
# Gate 1 / Direction B / Med-NCA
# -------------------------------------------------------------------
mode: damage

data:
  img_dir: "D:/YJ-Agent/project/meeting/Med-NCA/NCA-JEPA/data/nih_cxr14/images-224/images-224"
  csv_path: "D:/YJ-Agent/project/meeting/Med-NCA/NCA-JEPA/data/nih_cxr14/Data_Entry_2017.csv"
  n_normal: 500
  val_split: 0.1
  resolution: 64
  seed: 42

model:
  channel_n: 16
  hidden_size: 128
  fire_rate: 0.5
  input_channels: 1

train:
  steps_min: 32
  steps_max: 64
  batch: 4
  lr: 2.0e-3  # TODO: 未找到官方 persistence 训练 lr，参考官方 texture-NCA 2e-3，需 researcher 确认
  lr_gamma: 0.9999
  epochs: 100
  pool_size: 256
  pool_replace: 1

damage:
  frac: 0.25          # 损伤区边长 / 总边长
  steps_t2_min: 32    # 损伤后修复步数范围
  steps_t2_max: 64

diverge:
  loss_flat_tol: 1.0e-6
  loss_flat_steps: 20
  psnr_min: 10.0
  psnr_converge: 25.0

output:
  out_dir: "D:/YJ-Agent/project/meeting/Med-NCA/results/probe_persistence"
  save_img_every: 25
  state_json: "state.json"
