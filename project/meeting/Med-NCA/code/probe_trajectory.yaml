# probe_trajectory.yaml
# mode=trajectory: seed=t0(No Finding), target=t1(Nodule)，同患者纵向对
# Gate 3 / Direction B / Med-NCA -- 单病灶轨迹探针
# skeptic 修1：固定 Nodule（局灶病，局部外扩，叙事范例）
# 同VP对数实测：Nodule total=537, same_vp=400 (train~360/val~40)
# -------------------------------------------------------------------
mode: trajectory

data:
  img_dir: "D:/YJ-Agent/project/meeting/Med-NCA/NCA-JEPA/data/nih_cxr14/images-224/images-224"
  csv_path: "D:/YJ-Agent/project/meeting/Med-NCA/NCA-JEPA/data/nih_cxr14/Data_Entry_2017.csv"
  val_split: 0.1
  resolution: 64
  seed: 42
  # n_normal 仅 damage/reconstruct 用，trajectory 忽略此字段

trajectory:
  # 修1：固定 Nodule，不自动选最多
  finding: "Nodule"
  # 修1：只保留 t0/t1 同 View Position 的对（消除体位噪声）
  require_same_view: true
  max_pairs: null
  # 中间态评估 snapshot steps
  traj_eval_steps: [16, 32, 48, 64]
  # 修2：ROI mask 参数
  roi_smooth_sigma: 2.0        # 高斯平滑 sigma（近似，纯 numpy box filter）
  roi_threshold: 0.10          # |t1-t0| 平滑后 > 阈值才算 ROI
  front_changed_thresh: 0.05   # front_expansion 中像素变化判定阈值
  # 修2：PASS 判据裕量（NCA change_in_roi_frac 需超过 linear_interp 至少此值）
  roi_frac_margin: 0.05
  # 修3：U-Net 基线 base channels
  unet_base_ch: 16

model:
  channel_n: 16
  # 修1 材料 §5：容量重要，hidden_size 保持 128
  hidden_size: 128
  fire_rate: 0.5
  input_channels: 1

train:
  steps_min: 48
  steps_max: 64
  batch: 4
  lr: 2.0e-3  # TODO: 未找到 trajectory NCA 官方 lr，沿用 texture-NCA 2e-3，需 researcher 确认
  lr_gamma: 0.9999
  epochs: 150
  pool_size: 256
  pool_replace: 1

diverge:
  loss_flat_tol: 1.0e-6
  loss_flat_steps: 20
  # trajectory psnr 对 t1 而非自身，Nodule 对差异小，基线约 26-30 dB
  # 发散判据：跌破 10 dB = NaN 级别发散
  psnr_min: 10.0
  # converged 判据：超过基线 2 dB 视为有学习信号（主线按 state.json 的 pass_summary 判）
  psnr_converge: 28.0

output:
  out_dir: "D:/YJ-Agent/project/meeting/Med-NCA/results/probe_trajectory"
  save_img_every: 25
  state_json: "state.json"
