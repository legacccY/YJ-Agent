# skeleton_recall.yaml — Skeleton Recall loss baseline 配置（BASELINE_SPEC §2.4 loss 类）
# =======================================================================
# 超参来源  : github.com/MIC-DKFZ/Skeleton-Recall (Apache-2.0) + MICCAI 2024
#             + BASELINE_SPEC §2.4 统一 backbone/optimizer/scheduler
# 复现红线  : loss 类 adapter backbone/optimizer/scheduler 由代码强制钉死。
#             TODO 字段需 researcher 确认后回填。
# =======================================================================

# --------------------------------------------------------------------------
# Baseline 元数据
# --------------------------------------------------------------------------

baseline:
  name: "skeleton_recall"
  kind: "loss"
  source_repo: "https://github.com/MIC-DKFZ/Skeleton-Recall"
  env_tag: "main"
  paper_ref: "MICCAI 2024"

# --------------------------------------------------------------------------
# 模型超参（BASELINE_SPEC §2.4 loss 类统一 backbone，不得修改）
# --------------------------------------------------------------------------

model:
  in_ch: 1            # 绿通道 CLAHE 单通道
  out_ch: 1           # 二值血管/背景
  base_ch: 32         # 统一 base_ch=32（代码强制，yaml 记录对齐）

# --------------------------------------------------------------------------
# 训练超参（BASELINE_SPEC §2.4 loss 类统一，代码强制）
# --------------------------------------------------------------------------

train:
  optimizer: "Adam"
  lr: 1.0e-3                     # 统一 lr=1e-3（代码强制）
  scheduler: "ReduceLROnPlateau"
  scheduler_mode: "max"
  scheduler_factor: 0.5
  scheduler_patience: 10
  scheduler_min_lr: 1.0e-6
  epochs: 100                    # 与 Ours 主实验对齐
  batch_size: 2

# --------------------------------------------------------------------------
# Loss（Skeleton Recall：0.5 BCE+Dice 底座 + 0.5 SkelRecall 拓扑增益）
# --------------------------------------------------------------------------

loss:
  type: "SkelRecallMixed"
  # ⚠️ 真源 = adapter `src/baselines/adapters/skeleton_recall.py` 硬编码官方 1:1:1（BCE+Dice+SkelRecall），
  #    build_loss(cfg) 无视 cfg 的权重字段。下方 weight_* 为【已废弃死字段】（无代码读，留作文档）。
  #    🔒 loss 权重唯一真源 = adapter.build_loss()，train_harness/cfg 不得覆盖（对齐 PHASE_3_MATRIX §7 🟠-1）。
  # weight_base: 0.5      # 【废弃】旧 0.5/0.5 对称混合 = 偏离官方 1:1:1，已被 adapter 硬编码替代
  # weight_srec: 0.5      # 【废弃】同上
  # SkelRecall 内部参数（adapter 可能读，保留）
  smooth: 1.0              # 官方 SoftSkeletonRecallLoss smooth=1.（default）
  do_bg: false             # 官方强制 False（background 不参与 skeleton recall）

  # Skeleton GT 计算方式
  skel_method: "skimage_skeletonize"   # 官方 SkeletonTransform 使用 skimage.morphology.skeletonize
  skel_do_tube: false                   # do_tube=False（原始 skeleton，无 dilation）

  # 官方训练配方 weight_ce=1 weight_dice=1 weight_srec=1（三路等权，DC_SkelREC_and_CE_loss）
  # adapter 已按官方 1:1:1 硬编码（baseline-fix 2026-06-20 对齐官方源）

# --------------------------------------------------------------------------
# 预处理（BASELINE_SPEC §2.4 loss 类统一预处理，与 Ours 一致）
# --------------------------------------------------------------------------

preprocess:
  channels: "green_clahe"    # 绿通道 + CLAHE（与 Ours 同）
  input_mode: "fullimg"      # 全图推理
  patch_size: null
  clahe: true
  clahe_clip: 2.0
  normalize_mean: [0.5]
  normalize_std: [0.1]
  pad_multiple: 32            # 填充为 32 倍数（U-Net 下采样对齐）

# --------------------------------------------------------------------------
# 数据增强（BASELINE_SPEC §2.4 loss 类统一增强策略，与 Ours 一致）
# --------------------------------------------------------------------------

augment:
  strategy: "unified_loss_class"
  # TODO: 确认 Ours 精确增强策略后对齐
