# cbdice.yaml — cbDice loss baseline 配置（BASELINE_SPEC §2.4 loss 类）
# =======================================================================
# 超参来源  : github.com/PengchengShi1220/cbDice (Apache-2.0) + MICCAI 2024
#             + BASELINE_SPEC §2.4 统一 backbone/optimizer/scheduler
# 复现红线  : loss 类 adapter backbone/optimizer/scheduler 由代码强制钉死。
#             TODO 字段需 researcher 确认后回填。
# =======================================================================

# --------------------------------------------------------------------------
# Baseline 元数据
# --------------------------------------------------------------------------

baseline:
  name: "cbdice"
  kind: "loss"
  source_repo: "https://github.com/PengchengShi1220/cbDice"
  env_tag: "main"
  paper_ref: "MICCAI 2024"

# --------------------------------------------------------------------------
# 模型超参（BASELINE_SPEC §2.4 loss 类统一 backbone，不得修改）
# --------------------------------------------------------------------------

model:
  in_ch: 1            # 绿通道 CLAHE 单通道
  out_ch: 1           # 二值血管/背景
  base_ch: 32         # 统一 base_ch=32（代码强制，yaml 记录对齐）

# --------------------------------------------------------------------------
# 训练超参（BASELINE_SPEC §2.4 loss 类统一，代码强制）
# --------------------------------------------------------------------------

train:
  optimizer: "Adam"
  lr: 1.0e-3                     # 统一 lr=1e-3（代码强制）
  scheduler: "ReduceLROnPlateau"
  scheduler_mode: "max"
  scheduler_factor: 0.5
  scheduler_patience: 10
  scheduler_min_lr: 1.0e-6
  epochs: 100                    # 与 Ours 主实验对齐
  batch_size: 2

# --------------------------------------------------------------------------
# Loss（cbDice：0.5 BCE+Dice 底座 + 0.5 cbDice 拓扑增益）
# --------------------------------------------------------------------------

loss:
  type: "CbDiceMixed"
  # 混合权重（§2.4 隔离设计）
  weight_base: 0.5        # BCE+Dice 底座权重
  weight_cbdice: 0.5      # cbDice 拓扑增益权重
  # cbDice 内部参数
  iter_: 10               # SoftSkeletonize num_iter=10（官方 SoftcbDiceLoss 默认）
  smooth: 1.0             # 官方 smooth=1.

  # TODO_researcher: 官方 nnU-Net 训练配方使用 weight_ce=1 weight_dice=1 weight_cbdice=1（三路等权）
  # 当前用 0.5/(0.5+0.5) 对称混合；是否改为官方三路待确认

# --------------------------------------------------------------------------
# 预处理（BASELINE_SPEC §2.4 loss 类统一预处理，与 Ours 一致）
# --------------------------------------------------------------------------

preprocess:
  channels: "green_clahe"    # 绿通道 + CLAHE（与 Ours 同）
  input_mode: "fullimg"      # 全图推理
  patch_size: null
  clahe: true
  clahe_clip: 2.0
  normalize_mean: [0.5]
  normalize_std: [0.1]
  pad_multiple: 32            # 填充为 32 倍数（U-Net 下采样对齐）

# --------------------------------------------------------------------------
# 数据增强（BASELINE_SPEC §2.4 loss 类统一增强策略，与 Ours 一致）
# --------------------------------------------------------------------------

augment:
  strategy: "unified_loss_class"
  # TODO: 确认 Ours 精确增强策略后对齐
