fc_path:     data/external/abide1_cc200/fc_large_data_cc200.npy
meta_path:   data/external/abide1_cc200/abide1_cc200_meta.csv
split_csv:   data/external/abide1_cc200/splits/split_cc200_5fold.csv
output_dir:  results/hypergale
